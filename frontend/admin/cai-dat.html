<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài Đặt Chung - MotelMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --sidebar-bg: #F4FBF4; --main-bg: #f9fafb; --card-bg: #ffffff; --active-green: #BEE9BE; }
        body.dark { --sidebar-bg: #111111; --main-bg: #000000; --card-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--main-bg); transition: 0.3s; }
        .sidebar-bg { background-color: var(--sidebar-bg); }
        .nav-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-radius: 0.75rem; font-weight: 600; color: #4b5563; }
        .nav-active { background-color: var(--active-green) !important; color: #2E7D32 !important; }
        .card-style { background-color: var(--card-bg); border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); }
        .transition-all { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 sidebar-bg h-full border-r border-gray-100 dark:border-zinc-800 flex flex-col shrink-0">
        <div class="p-6 mb-4 flex items-center gap-3">
            <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center text-white text-xl shadow-lg">
                <i class="fa-solid fa-house-chimney"></i>
            </div>
            <span class="font-bold text-xl text-green-800 dark:text-green-400">MotelMS</span>
        </div>
        <nav class="flex-1 px-4 overflow-y-auto">
            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Nghiệp vụ</p>
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line w-6 text-xl"></i> <span>Tổng Quan</span></a>
                <a href="hoa-don.html" class="nav-item"><i class="fa-solid fa-file-invoice-dollar w-6 text-xl"></i> <span>Hóa Đơn</span></a>
            </div>
            <div class="mb-6">
                <p class="px-3 text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Dữ liệu</p>
                <a href="phong.html" class="nav-item"><i class="fa-solid fa-door-open w-6 text-xl"></i> <span>Phòng</span></a>
                <a href="dich-vu.html" class="nav-item"><i class="fa-solid fa-wifi w-6 text-xl"></i> <span>Dịch Vụ</span></a>
                <a href="dien-nuoc.html" class="nav-item"><i class="fa-solid fa-bolt w-6 text-xl"></i> <span>Điện Nước</span></a>
                <a href="khach-hang.html" class="nav-item"><i class="fa-solid fa-user-group w-6 text-xl"></i> <span>Khách Hàng</span></a>
                <a href="hop-dong.html" class="nav-item"><i class="fa-solid fa-file-contract w-6 text-xl"></i> <span>Hợp Đồng</span></a>
            </div>
            <div class="mt-auto pb-6 border-t border-gray-100 dark:border-zinc-800 pt-4">
                <p class="px-3 text-xs font-bold text-gray-400 dark:text-zinc-500 uppercase mb-4 tracking-widest">Hệ thống</p>
                <a href="cai-dat.html" class="nav-item nav-active">
                    <i class="fa-solid fa-gear w-6 text-xl"></i> <span>Cài Đặt Chung</span>
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white dark:bg-black border-b border-gray-100 dark:border-zinc-800 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-3 text-gray-400">
                <i class="fas fa-gear"></i>
                <span class="text-sm font-bold uppercase tracking-widest">Hệ thống / Cài đặt hồ sơ</span>
            </div>
            <div class="flex items-center gap-4">
                <div id="header-avatar-container" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border border-gray-100 shadow-sm">
                    <img id="header-avatar-img" src="" class="w-full h-full object-cover hidden">
                    <i id="header-avatar-icon" class="fas fa-user text-gray-400"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <h1 class="font-bold text-2xl text-gray-800 dark:text-zinc-100 uppercase italic mb-8">CÀI ĐẶT HỒ SƠ CHỦ TRỌ</h1>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="card-style p-8 flex flex-col items-center justify-center text-center">
                    <div class="relative group">
                        <div class="w-40 h-40 rounded-full border-4 border-green-50 shadow-xl overflow-hidden mb-4 bg-gray-100">
                            <img id="avatarPreview" src="https://placehold.co/150" alt="Avatar" class="w-full h-full object-cover">
                        </div>
                        <label for="uploadAvatar" class="absolute bottom-4 right-2 w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:bg-blue-700 transition-all border-2 border-white">
                            <i class="fa-solid fa-camera"></i>
                        </label>
                    </div>
                    <h2 id="display-name" class="font-bold text-xl text-gray-800 dark:text-zinc-100 mt-4">Chủ Trọ</h2>
                    <p class="text-gray-400 text-xs uppercase tracking-widest font-bold mt-1">Quản trị viên hệ thống</p>
                </div>

                <div class="lg:col-span-2 card-style p-8">
                    <form id="profileForm" class="space-y-6">
                        <input type="file" id="uploadAvatar" name="avatar" class="hidden" accept="image/*" onchange="previewImage(event)">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Họ và tên chủ trọ *</label>
                                <input type="text" name="full_name" required class="w-full bg-gray-50 dark:bg-zinc-800/50 p-3 rounded-xl outline-none border border-gray-100 dark:border-zinc-700 font-bold focus:border-green-500 transition-all dark:text-white">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Số điện thoại liên hệ</label>
                                <input type="tel" name="phone" class="w-full bg-gray-50 dark:bg-zinc-800/50 p-3 rounded-xl outline-none border border-gray-100 dark:border-zinc-700 font-bold focus:border-green-500 transition-all dark:text-white">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Số CCCD / Định danh</label>
                                <input type="text" name="cccd" class="w-full bg-gray-50 dark:bg-zinc-800/50 p-3 rounded-xl outline-none border border-gray-100 dark:border-zinc-700 font-bold focus:border-green-500 transition-all dark:text-white">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Ngày cấp CCCD</label>
                                <input type="date" name="cccd_date" class="w-full bg-gray-50 dark:bg-zinc-800/50 p-3 rounded-xl outline-none border border-gray-100 dark:border-zinc-700 font-bold focus:border-green-500 transition-all dark:text-white">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Địa chỉ thường trú (Hiển thị trên hợp đồng)</label>
                            <input type="text" name="owner_address" class="w-full bg-gray-50 dark:bg-zinc-800/50 p-3 rounded-xl outline-none border border-gray-100 dark:border-zinc-700 font-bold focus:border-green-500 transition-all dark:text-white">
                        </div>

                        <div class="flex items-center justify-between p-4 bg-red-50 dark:bg-red-900/10 rounded-2xl mt-4 border border-red-100 dark:border-red-900/20">
                            <div>
                                <p class="font-bold text-red-600 dark:text-red-400">Đăng xuất hệ thống</p>
                                <p class="text-xs text-gray-400">Thoát khỏi phiên làm việc hiện tại</p>
                            </div>
                            <button type="button" onclick="handleLogout()" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-red-700 transition-all text-xs uppercase tracking-widest">
                                <i class="fa-solid fa-right-from-bracket mr-2"></i> Đăng xuất
                            </button>
                        </div>

                        <div class="flex justify-end pt-4">
                            <button type="submit" id="btnSave" class="bg-green-600 text-white px-10 py-3.5 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-all uppercase text-sm tracking-widest">
                                Lưu thay đổi hồ sơ
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/setting.js"></script>
    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('avatarPreview').src = reader.result;
            }
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        // GIỮ LOGIC ĐỂ ĐỌC THEME TỪ LOCALSTORAGE
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }

        function handleLogout() {
            if (confirm("Mày có chắc chắn muốn đăng xuất không?")) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '../auth/login.html'; 
            }
        }
    </script>
</body>
</html>
