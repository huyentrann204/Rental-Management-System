<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Motel Management System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh; 
            /* Đồng bộ ảnh nền toàn trang */
            background: url('../assets/images/background.jpg') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Lớp phủ tối mờ */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .auth-container { 
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px; /* Rộng hơn đăng nhập một chút vì nhiều input hơn */
        }

        /* Ô đăng ký Kính mờ (Đồng bộ trang login) */
        .auth-box { 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
        .auth-logo-text { font-size: 26px; font-weight: 800; color: #77C47C; }
        
        .auth-title { text-align: center; font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
        .auth-subtitle { text-align: center; color: #555; font-size: 13px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-wrapper { position: relative; }
        .form-input { 
            width: 100%; 
            padding: 12px 16px; 
            padding-right: 40px; 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 12px; 
            font-size: 14px; 
            transition: all 0.3s;
            background: white;
        }
        .form-input:focus { outline: none; border-color: #77C47C; box-shadow: 0 0 0 4px rgba(119, 196, 124, 0.15); }
        
        .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #888; cursor: pointer; }

        .btn-auth { 
            width: 100%; 
            padding: 14px; 
            background: #77C47C; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(119, 196, 124, 0.3);
        }
        .btn-auth:hover { background: #66b36b; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(119, 196, 124, 0.4); }
        .btn-auth:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        .auth-alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; display: none; text-align: center; font-weight: 600; }
        
        .terms-checkbox { display: flex; align-items: center; gap: 10px; margin: 15px 0; font-size: 13px; color: #444; cursor: pointer; }
        .terms-checkbox input { width: 16px; height: 16px; accent-color: #77C47C; }

        .login-link { text-align: center; margin-top: 25px; font-size: 14px; color: #555; }
        .login-link a { color: #77C47C; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .login-link a:hover { text-decoration: underline; }

        /* Custom scrollbar cho ô form nếu quá dài */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #77C47C; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <span style="font-size: 32px;">🏠</span>
                <span class="auth-logo-text">MotelMS</span>
            </div>
            <h1 class="auth-title">Đăng ký Quản trị</h1>
            <p class="auth-subtitle">Gia nhập hệ thống quản lý chuyên nghiệp</p>

            <div id="alertBox" class="auth-alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Họ và tên</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" class="form-input" placeholder="Nhập họ và tên đầy đủ" required>
                        <span class="input-icon"><i class="fas fa-user"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="Nhập địa chỉ email" required>
                        <span class="input-icon"><i class="fas fa-envelope"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Số điện thoại</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" class="form-input" placeholder="Nhập số điện thoại" required>
                        <span class="input-icon"><i class="fas fa-phone"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Tối thiểu 6 ký tự" required>
                        <span class="input-icon" onclick="togglePass('password')"><i class="fas fa-eye"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Nhập lại mật khẩu" required>
                        <span class="input-icon" onclick="togglePass('confirmPassword')"><i class="fas fa-eye"></i></span>
                    </div>
                </div>

                <label class="terms-checkbox">
                    <input type="checkbox" id="agreeTerms" required>
                    <span>Tôi đồng ý với Điều khoản & Chính sách</span>
                </label>

                <button type="submit" class="btn-auth" id="submitBtn">Tạo tài khoản ngay</button>
            </form>

            <div class="login-link">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { apiRequest } from '../assets/js/api.js';

        // Hiện/ẩn mật khẩu với FontAwesome
        window.togglePass = (id) => {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        const form = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                return showMsg('#fee2e2', 'Mật khẩu xác nhận không khớp!', '#991b1b');
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Đang khởi tạo...';
                alertBox.style.display = 'none';

                await apiRequest('/auth/register', 'POST', { 
                    fullName, 
                    email, 
                    phone,
                    password,
                    role: 'admin' 
                });

                showMsg('#dcfce7', 'Đăng ký thành công! Đang chuyển hướng...', '#166534');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                showMsg('#fee2e2', err.message || 'Lỗi kết nối server!', '#991b1b');
                btn.disabled = false;
                btn.textContent = 'Tạo tài khoản ngay';
            }
        };

        function showMsg(bg, txt, color) {
            alertBox.style.display = 'block';
            alertBox.style.backgroundColor = bg;
            alertBox.style.color = color;
            alertBox.style.border = `1px solid ${color}`;
            alertBox.textContent = txt;
        }
    </script>
</body>
</html>
