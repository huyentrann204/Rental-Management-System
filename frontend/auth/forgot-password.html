<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Motel Management System</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            overflow: hidden;
            background: url('../assets/images/background.jpg') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .auth-container { 
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .auth-box { 
            width: 100%; 
            max-width: 420px; 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .recovery-icon {
            width: 70px; height: 70px; background: #f0fdf4; color: #77C47C;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 20px; font-size: 30px; margin-bottom: 20px;
        }

        .auth-title { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
        .auth-subtitle { color: #555; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-wrapper { position: relative; }
        .form-input { 
            width: 100%; 
            padding: 14px 16px; 
            padding-right: 45px; 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 12px; 
            font-size: 14px; 
            transition: all 0.3s;
            background: white;
        }
        .form-input:focus { outline: none; border-color: #77C47C; box-shadow: 0 0 0 4px rgba(119, 196, 124, 0.15); }
        
        .input-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #888; font-size: 18px; }

        .btn-auth { 
            width: 100%; 
            padding: 15px; 
            background: #77C47C; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(119, 196, 124, 0.3);
        }
        .btn-auth:hover { background: #66b36b; transform: translateY(-2px); box-shadow: 0 10px 25px rgba(119, 196, 124, 0.4); }
        .btn-auth:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Vùng báo lỗi đồng bộ */
        #alertBox {
            padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; display: none; text-align: center; font-weight: 600;
        }

        .back-link { margin-top: 25px; font-size: 14px; }
        .back-link a { color: #77C47C; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="recovery-icon">
                <i class="fas fa-key"></i>
            </div>
            
            <h1 class="auth-title">Khôi phục mật khẩu</h1>
            <p class="auth-subtitle">
                Nhập email của bạn để nhận mật khẩu mới dùng để đăng nhập hệ thống.
            </p>

            <div id="alertBox"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email đăng ký</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="example@gmail.com" required>
                        <span class="input-icon"><i class="fas fa-paper-plane"></i></span>
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="btnSubmit">Gửi mật khẩu mới</button>
            </form>

            <div class="back-link">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { apiRequest } from '../assets/js/api.js';

        const form = document.getElementById('forgotPasswordForm');
        const btn = document.getElementById('btnSubmit');
        const alertBox = document.getElementById('alertBox');

        // Hàm hiện thông báo thay thế utilities.js bị lỗi
        const showMsg = (msg, isError = true) => {
            alertBox.style.display = 'block';
            alertBox.style.backgroundColor = isError ? '#fee2e2' : '#dcfce7';
            alertBox.style.color = isError ? '#991b1b' : '#166534';
            alertBox.style.border = `1px solid ${isError ? '#fecaca' : '#bbf7d0'}`;
            alertBox.textContent = msg;
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            // Kiểm tra email cơ bản
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                return showMsg('Email không đúng định dạng!');
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Đang xử lý...';
                alertBox.style.display = 'none';

                // Gọi API Backend
                const res = await apiRequest('/auth/forgot-password', 'POST', { email });

                if (res.success) {
                    showMsg('Mật khẩu mới đã được gửi! Đang quay lại trang đăng nhập...', false);
                    
                    // Chuyển hướng về login sau 3 giây
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            } catch (err) {
                console.error("Lỗi:", err);
                showMsg(err.message || 'Lỗi hệ thống! Hãy kiểm tra terminal Node.js.');
                btn.disabled = false;
                btn.textContent = 'Gửi mật khẩu mới';
            }
        };
    </script>
</body>
</html>
